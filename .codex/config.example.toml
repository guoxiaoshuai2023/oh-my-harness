# Optional Codex repo config example for downstream projects.
# Copy this file to `.codex/config.toml` only if your Codex version supports
# repo-local config with these keys.

[features]
multi_agent = true

[multi_agent]
# This is corroborating configuration only. It does not grant fan-out,
# lifecycle authority, report-path isolation, or proof of runtime enforcement.
# Harness capabilities are unconditionally hard no-fan-out; only main launches
# each separate invocation.
max_depth = 1
