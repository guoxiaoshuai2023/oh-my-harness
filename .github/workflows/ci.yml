name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check normative diff whitespace
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            git diff --check \
              "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          else
            git show --check --format= HEAD
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile helper scripts
        run: python -m py_compile scripts/*.py

      - name: Validate repository hygiene
        run: |
          python -m unittest discover -s test/repository-hygiene -p 'test_*.py'
          python tools/check_repository_hygiene.py

      - name: Parse Codex agent profiles
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          expected = {
              "harness-executor.toml",
              "harness-plan-evaluator.toml",
              "harness-planner.toml",
              "harness-result-evaluator.toml",
              "harness-solution-designer.toml",
              "harness-solution-evaluator.toml",
          }
          paths = sorted(Path(".codex/agents").glob("*.toml"))
          assert {path.name for path in paths} == expected
          for path in paths:
              with path.open("rb") as handle:
                  data = tomllib.load(handle)
              if "evaluator" in path.name:
                  assert data["sandbox_mode"] == "read-only", path
                  prompt = data["developer_instructions"]
                  required = [
                      "canonical evaluator-calibration identity and path",
                      "STOP before review",
                      "Consult that supplied canonical source before deciding",
                      "never substitutes for primary",
                      "Consulted calibration path",
                      "Relevant calibration case IDs",
                      "do not edit, repair, complete",
                  ]
                  for text in required:
                      assert text in prompt, (path, text)
          print(
              "parsed exactly six Codex agent profiles; "
              "evaluator read-only/calibration invariants passed"
          )
          PY

      - name: Run router fixture smoke check
        run: |
          python scripts/validate_router_fixture.py \
            --router AGENTS.md \
            --fixture task-docs/_harness/templates/routing-scenario-matrix-template.md

      - name: Validate adaptive orchestration structure
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def markdown_cells(row: str) -> list[str]:
              return [cell.strip() for cell in row.strip().strip("|").split("|")]

          matrix_path = Path("task-docs/_harness/adaptive-orchestration-acceptance-matrix.md")
          matrix_lines = matrix_path.read_text(encoding="utf-8").splitlines()

          as_rows = [line for line in matrix_lines if re.match(r"^\| AS-\d{2} \|", line)]
          assert len(as_rows) == 31
          assert [markdown_cells(row)[0] for row in as_rows] == [
              f"AS-{number:02d}" for number in range(1, 32)
          ]
          assert all(len(markdown_cells(row)) == 11 for row in as_rows)
          assert all(markdown_cells(row)[-1] == "PASS" for row in as_rows)
          assert not any(line.startswith("| AS-32 |") for line in matrix_lines)

          cc_rows = [line for line in matrix_lines if re.match(r"^\| CC-", line)]
          expected_cc = [
              "CC-LOW",
              "CC-MEDIUM",
              "CC-HIGH",
              "CC-FULL-V2",
              "CC-NEGATIVE",
              "CC-DELIBERATE-FULL-V2",
          ]
          assert [markdown_cells(row)[0] for row in cc_rows] == expected_cc
          cc_decisions = {markdown_cells(row)[0]: markdown_cells(row)[-1] for row in cc_rows}
          assert cc_decisions["CC-NEGATIVE"] == "FAIL"
          assert cc_decisions["CC-DELIBERATE-FULL-V2"].startswith("PASS")
          assert sum(
              "packet applies the combined evaluator interface" in line
              for line in matrix_lines
          ) == 8

          task_packet = Path(
              "task-docs/_harness/templates/task-packet-template.md"
          ).read_text(encoding="utf-8")
          for text in [
              "Canonical evaluator-calibration identity:",
              "Canonical evaluator-calibration path:",
              "consult the canonical evaluator-calibration source above before deciding",
              "Consulted calibration path:",
              "Relevant calibration case IDs:",
              "must `STOP` before launch",
          ]:
              assert text in task_packet, text

          topology_surfaces = {
              Path("task-docs/_harness/templates/orchestration-prompt-template.md"): [
                  "Adaptive default — MUST",
                  "Required complete v2 — MUST",
                  "Deliberate complete v2 — MAY",
              ],
              Path("task-docs/_harness/templates/plan-review-template.md"): [
                  "Adaptive-default state `MUST`",
                  "Required-complete-v2 state `MUST`",
                  "Deliberate-complete-v2 state `MAY`",
              ],
              Path("task-docs/_harness/templates/result-qa-template.md"): [
                  "Adaptive-default state `MUST`",
                  "Required-complete-v2 state `MUST`",
                  "Deliberate-complete-v2 state `MAY`",
              ],
          }
          for path, required in topology_surfaces.items():
              text = path.read_text(encoding="utf-8")
              for marker in required:
                  assert marker in text, (path, marker)

          calibration = Path("task-docs/_harness/evaluator-calibration.md").read_text(
              encoding="utf-8"
          )
          adaptive_headings = re.findall(
              r"^### Case (CAL-ADAPT-\d{3}) - ", calibration, re.MULTILINE
          )
          assert adaptive_headings == [f"CAL-ADAPT-{number:03d}" for number in range(1, 11)]
          required_fields = [
              "Case id:",
              "Category:",
              "Case type:",
              "Applies to:",
              "Task pattern / bad pattern:",
              "Evaluator incorrectly decided:",
              "Expected decision:",
              "Why it fails:",
              "Controlling rule:",
              "Missing evidence / evidence needed:",
              "Required evaluator/main-thread response:",
              "New evaluator rule:",
              "Reusable positive/negative case:",
              "Relevant prompt/template targets:",
          ]
          for index, case_id in enumerate(adaptive_headings):
              start = calibration.index(f"### Case {case_id} - ")
              if index + 1 < len(adaptive_headings):
                  end = calibration.index(f"### Case {adaptive_headings[index + 1]} - ")
              else:
                  end = len(calibration)
              section = calibration[start:end]
              for field in required_fields:
                  assert section.count(field) == 1, (case_id, field)

          surfaces = [
              Path("task-docs/_harness/templates/routing-scenario-matrix-template.md"),
              Path("README.md"),
              Path("docs/architecture.md"),
              Path("docs/adoption/router-refactor-runbook.md"),
              Path("examples/minimal-router/AGENTS.md"),
          ]
          for path in surfaces:
              text = path.read_text(encoding="utf-8")
              assert "smallest sufficient" in text, path
              assert "MUST" in text, path
              assert "stricter" in text and "policy" in text, path
              assert "MAY" in text, path
              assert "deliberate" in text.lower(), path

          validator = Path("scripts/validate_router_fixture.py").read_text(encoding="utf-8")
          assert "not a semantic equivalence verifier" in validator
          assert "router fixture smoke/coverage check passed" in validator
          assert "rule-preservation proof" in validator

          print(
              "adaptive structure and repaired invocation invariants passed; "
              "structural checks and router smoke are not semantic proof"
          )
          PY

      - name: Set up Node.js 24.14.0
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Verify package runtime boundary
        run: |
          node --version
          npm --version
          python3.11 --version
          node - <<'NODE'
          const metadata = require('./package.json');
          if (metadata.dependencies || metadata.devDependencies) {
            throw new Error('lifecycle package must have zero third-party runtime dependencies');
          }
          if (metadata.engines?.node !== '>=24 <25') {
            throw new Error('unexpected Node engine');
          }
          NODE

      - name: Run accepted bundle and lifecycle tests
        run: npm test

      - name: Run Universal Harness acceptance scenarios
        run: node --test test/acceptance/*.test.mjs

      - name: Validate local package lifecycle
        run: npm run validate:package

      - name: Validate release contents and semantics
        run: node tools/validate-release.mjs
