name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  source-gate:
    runs-on: ubuntu-latest
    outputs:
      receipt: ${{ steps.receipt.outputs.receipt }}
      receipt_sha256: ${{ steps.receipt.outputs.receipt_sha256 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check normative diff whitespace
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            git diff --check \
              "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          else
            git show --check --format= HEAD
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile helper scripts
        run: python -m py_compile scripts/*.py

      - name: Validate repository hygiene
        run: |
          python -m unittest discover -s test/repository-hygiene -p 'test_*.py'
          python tools/check_repository_hygiene.py

      - name: Parse Codex agent profiles
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          expected = {
              "harness-executor.toml",
              "harness-orchestration-reviewer.toml",
              "harness-plan-evaluator.toml",
              "harness-planner.toml",
              "harness-requirements-author.toml",
              "harness-requirements-evaluator.toml",
              "harness-result-evaluator.toml",
              "harness-solution-designer.toml",
              "harness-solution-evaluator.toml",
          }
          paths = sorted(Path(".codex/agents").glob("*.toml"))
          assert {path.name for path in paths} == expected
          report_capable = {
              "harness-orchestration-reviewer.toml",
              "harness-plan-evaluator.toml",
              "harness-requirements-evaluator.toml",
              "harness-result-evaluator.toml",
              "harness-solution-evaluator.toml",
          }
          descriptions = set()
          for path in paths:
              with path.open("rb") as handle:
                  data = tomllib.load(handle)
              assert set(data) <= {
                  "name", "description", "sandbox_mode", "developer_instructions"
              }, path
              assert data["sandbox_mode"] == "workspace-write", path
              descriptions.add(data["description"])
              prompt = data["developer_instructions"]
              assert "must not create, invoke, launch, delegate to, or reconfigure another agent" in prompt, path
              assert "nested delegation" not in prompt.lower(), path
              if path.name in report_capable:
                  for text in [
                      "logical report-only write boundary plus post-execution verification",
                      "canonical evaluator calibration identity and path",
                      "strict PASS or FAIL",
                      "primary evidence",
                  ]:
                      assert text in prompt, (path, text)
          assert len(descriptions) == 9
          print(
              "parsed exactly nine Codex capability profiles; "
              "hard no-fan-out and report-capable evaluator invariants passed"
          )
          PY

      - name: Run router fixture smoke check
        run: |
          python scripts/validate_router_fixture.py \
            --router AGENTS.md \
            --fixture task-docs/_harness/templates/routing-scenario-matrix-template.md

      - name: Validate unified source-governance structure
        run: |
          python - <<'PY'
          from pathlib import Path

          adaptive = Path("task-docs/_harness/adaptive-orchestration-protocol.md").read_text(encoding="utf-8")
          packet = Path("task-docs/_harness/templates/task-packet-template.md").read_text(encoding="utf-8")
          calibration = Path("task-docs/_harness/evaluator-calibration.md").read_text(encoding="utf-8")
          matrix = Path("task-docs/_harness/adaptive-orchestration-acceptance-matrix.md").read_text(encoding="utf-8")
          for text in [
              "Requirements Author", "Requirements Evaluator", "Planner", "Plan Evaluator",
              "Solution Designer", "Solution Evaluator", "Executor", "Result Evaluator",
              "Orchestration Reviewer", "There are no selectable mode labels",
              "Every capability is hard no-fan-out", "Main-Exclusive Authority",
              "Integrity Precedence And Report Recovery",
          ]:
              assert text in adaptive, text
          for text in [
              "Hard No-Fan-Out", "Candidate Or Producer Report Binding",
              "Evaluator Report Binding", "logical report-only write boundary plus post-execution verification",
              "new invocation and new absent path",
          ]:
              assert text in packet, text
          for case_id in [
              "CAL-ADAPT-011", "CAL-ADAPT-012", "CAL-ADAPT-013",
              "CAL-ADAPT-014", "CAL-ADAPT-015", "CAL-ADAPT-016",
          ]:
              assert case_id in calibration, case_id
          for scenario in [
              "AO-001", "AO-003", "AO-004", "DS-003", "LC-001",
              "RC-001", "BD-004", "RP-007", "SO-005",
          ]:
              assert scenario in matrix, scenario

          validator = Path("scripts/validate_router_fixture.py").read_text(encoding="utf-8")
          assert "not a semantic equivalence verifier" in validator
          assert "router fixture smoke/coverage check passed" in validator
          assert "rule-preservation proof" in validator

          print(
              "unified source-governance structure and lifecycle invariants passed; "
              "structural checks and router smoke are not semantic proof"
          )
          PY

      - name: Set up Node.js 24.14.0
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Verify package runtime boundary
        run: |
          node --version
          npm --version
          python3.11 --version
          node - <<'NODE'
          const metadata = require('./package.json');
          if (metadata.dependencies || metadata.devDependencies) {
            throw new Error('lifecycle package must have zero third-party runtime dependencies');
          }
          if (metadata.engines?.node !== '>=24 <25') {
            throw new Error('unexpected Node engine');
          }
          NODE

      - name: Run source governance behavior tests
        run: node --test test/governance/*.test.mjs

      - name: Run complete bundle source-gate tests
        run: node --test test/bundle/*.test.mjs

      - name: Verify exact source release contract without generation
        run: |
          node --input-type=module - <<'NODE'
          import assert from 'node:assert/strict';
          import { createHash } from 'node:crypto';
          import { readFile } from 'node:fs/promises';
          import {
            TARGET_PROJECTION_SHA256,
            TARGET_REQUIRED_PROJECTION_SHA256,
            assertBundleMap,
            bundleProjection,
          } from './src/bundle/validation.mjs';

          const map = JSON.parse(await readFile('packaging/bundle-map.json'));
          assertBundleMap(map);
          assert.equal(createHash('sha256').update(bundleProjection(map.entries)).digest('hex'), TARGET_PROJECTION_SHA256);
          assert.equal(createHash('sha256').update(bundleProjection(map.entries, true)).digest('hex'), TARGET_REQUIRED_PROJECTION_SHA256);
          assert.equal(map.entries.length, 49);
          assert.equal(map.entries.filter(({ kind }) => kind === 'template').length, 17);
          assert.equal(map.entries.filter(({ kind }) => kind === 'agent-profile').length, 9);
          assert.equal(map.entries.some(({ assetId }) => assetId === ['template', 'task-contract'].join('/')), false);
          NODE
          node --test test/acceptance/release-equivalence.test.mjs

      - name: Issue exact terminal source-gate receipt
        id: receipt
        env:
          T01_CURRENTNESS: 0efc81242e490680464885c2ee4c916341c3844efa708fd8aa988261890c48e2
          T02_CURRENTNESS: 3048ff5d4a45097212411ea9e1a0df148bb369372e46644412f3436b49a94714
          T03_CURRENTNESS: 798bc74b2918666ded7e1d4ed192dcaba514570864fab400cd9e79cffcf2f8ad
        run: |
          mkdir "$RUNNER_TEMP/oh-my-harness-source-gate"
          node --input-type=module - <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { createHash } from 'node:crypto';
          import { readFileSync, realpathSync, writeFileSync } from 'node:fs';
          import path from 'node:path';

          const sha256 = (bytes) => createHash('sha256').update(bytes).digest('hex');
          const sourceFiles = execFileSync('git', ['ls-files', '-z'])
            .toString('utf8').split('\0').filter(Boolean)
            .sort((left, right) => Buffer.from(left).compare(Buffer.from(right)))
            .map((file) => ({ path: file, sha256: sha256(readFileSync(file)) }));
          const finalSourceManifestSha256 = sha256(Buffer.from(
            `${sourceFiles.map((entry) => `${entry.path}\t${entry.sha256}`).join('\n')}\n`,
          ));
          const gateReport = Buffer.from([
            'CI terminal source gate: strict PASS',
            `gitHead=${process.env.GITHUB_SHA}`,
            `finalSourceManifestSha256=${finalSourceManifestSha256}`,
            'release generation/package/install not run before this receipt',
            '',
          ].join('\n'));
          const reportPath = path.join(process.env.RUNNER_TEMP, 'oh-my-harness-source-gate', 'gate-report.txt');
          writeFileSync(reportPath, gateReport, { flag: 'wx' });
          const receipt = {
            schemaVersion: 1,
            state: 'SOURCE_GATED',
            gateIdentity: `ci-source-gate:${process.env.GITHUB_SHA}:${finalSourceManifestSha256}`,
            gateReportSha256: sha256(gateReport),
            gitHead: process.env.GITHUB_SHA,
            sourceRootRealpath: realpathSync(process.env.GITHUB_WORKSPACE),
            upstreamTransitions: [process.env.T01_CURRENTNESS, process.env.T02_CURRENTNESS, process.env.T03_CURRENTNESS],
            finalSourceManifestSha256,
            sourceFiles,
          };
          const receiptPath = path.join(process.env.RUNNER_TEMP, 'oh-my-harness-source-gate', 'receipt.json');
          const receiptBytes = Buffer.from(`${JSON.stringify(receipt)}\n`);
          writeFileSync(receiptPath, receiptBytes, { flag: 'wx' });
          writeFileSync(process.env.GITHUB_OUTPUT, [
            `receipt=${receiptBytes.toString('base64')}`,
            `receipt_sha256=${sha256(receiptBytes)}`,
            '',
          ].join('\n'), { flag: 'a' });
          NODE

  release:
    needs: source-gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact gated repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 24.14.0
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Restore and verify terminal source-gate receipt
        env:
          SOURCE_GATE_RECEIPT_BASE64: ${{ needs.source-gate.outputs.receipt }}
          OH_MY_HARNESS_SOURCE_GATE_RECEIPT_SHA256: ${{ needs.source-gate.outputs.receipt_sha256 }}
        run: |
          SOURCE_GATE_ROOT="$RUNNER_TEMP/oh-my-harness-source-gate"
          mkdir "$SOURCE_GATE_ROOT"
          printf '%s' "$SOURCE_GATE_RECEIPT_BASE64" | base64 --decode > "$SOURCE_GATE_ROOT/receipt.json"
          echo "OH_MY_HARNESS_SOURCE_GATE_RECEIPT=$SOURCE_GATE_ROOT/receipt.json" >> "$GITHUB_ENV"
          echo "OH_MY_HARNESS_SOURCE_GATE_RECEIPT_SHA256=$OH_MY_HARNESS_SOURCE_GATE_RECEIPT_SHA256" >> "$GITHUB_ENV"
          OH_MY_HARNESS_SOURCE_GATE_RECEIPT="$SOURCE_GATE_ROOT/receipt.json" \
            node --input-type=module -e "import { verifyTerminalSourceGate } from './tools/validate-release.mjs'; await verifyTerminalSourceGate();"

      - name: Run accepted bundle and lifecycle tests
        run: npm test

      - name: Reverify terminal source-gate receipt after npm test
        run: node --input-type=module -e "import { verifyTerminalSourceGate } from './tools/validate-release.mjs'; await verifyTerminalSourceGate();"

      - name: Run Universal Harness acceptance scenarios
        run: node --test test/acceptance/*.test.mjs

      - name: Validate local package lifecycle
        run: npm run validate:package

      - name: Validate release contents and semantics
        run: node tools/validate-release.mjs
